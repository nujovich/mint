<svg xmlns="http://www.w3.org/2000/svg" width="1390" height="724" viewBox="0 0 1390 724">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#41E3B0"/>
      <stop offset="1" stop-color="#0E9A70"/>
    </linearGradient>
    <filter id="card" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="28" flood-color="#053E2D" flood-opacity="0.30"/>
    </filter>
    <filter id="dot" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#053E2D" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1390" height="724" fill="url(#bg)"/>
  <!-- faint decorative circles -->
  <circle cx="120" cy="640" r="220" fill="#FFFFFF" opacity="0.06"/>
  <circle cx="1280" cy="90" r="160" fill="#FFFFFF" opacity="0.06"/>

  <!-- LEFT: wordmark -->
  <text x="96" y="236" font-family="Ubuntu, 'Liberation Sans', sans-serif" font-size="24" font-weight="700" letter-spacing="6" fill="#FFFFFF" opacity="0.82">PENPOT PLUGIN</text>

  <text x="94" y="336" font-family="Ubuntu, 'Liberation Sans', sans-serif" font-size="82" font-weight="700" fill="#FFFFFF">Mint · DTCG</text>
  <text x="94" y="432" font-family="Ubuntu, 'Liberation Sans', sans-serif" font-size="82" font-weight="700" fill="#FFFFFF">token import</text>

  <text x="96" y="506" font-family="Ubuntu, 'Liberation Sans', sans-serif" font-size="30" font-weight="400" fill="#FFFFFF" opacity="0.92">Import W3C Design Tokens into Penpot as</text>
  <text x="96" y="548" font-family="Ubuntu, 'Liberation Sans', sans-serif" font-size="30" font-weight="400" fill="#FFFFFF" opacity="0.92">native, always-in-sync token sets.</text>

  <!-- RIGHT: token-sets panel mock -->
  <g filter="url(#card)">
    <rect x="852" y="150" width="446" height="424" rx="28" fill="#FFFFFF"/>
  </g>
  <text x="888" y="212" font-family="Ubuntu, 'Liberation Sans', sans-serif" font-size="20" font-weight="700" letter-spacing="2" fill="#8A8A8A">TOKENS</text>
  <rect x="888" y="230" width="374" height="2" rx="1" fill="#EEEEEE"/>

  <g filter="url(#dot)">
    <circle cx="906" cy="278" r="15" fill="#1976D2"/>
    <rect x="936" y="268" width="250" height="20" rx="10" fill="#E7E7E7"/>

    <circle cx="906" cy="330" r="15" fill="#E53935"/>
    <rect x="936" y="320" width="196" height="20" rx="10" fill="#E7E7E7"/>

    <circle cx="906" cy="382" r="15" fill="#F5A623"/>
    <rect x="936" y="372" width="228" height="20" rx="10" fill="#E7E7E7"/>

    <circle cx="906" cy="434" r="15" fill="#2E7D32"/>
    <rect x="936" y="424" width="170" height="20" rx="10" fill="#E7E7E7"/>

    <circle cx="906" cy="486" r="15" fill="#8E24AA"/>
    <rect x="936" y="476" width="214" height="20" rx="10" fill="#E7E7E7"/>
  </g>

  <rect x="888" y="520" width="374" height="2" rx="1" fill="#EEEEEE"/>
  <text x="888" y="556" font-family="Ubuntu, 'Liberation Sans', sans-serif" font-size="18" font-weight="700" fill="#0E9A70">Done — imported 81 tokens in 5 sets</text>
</svg>
